logLevel: Debug

backgroundWorker:
  host: 0.0.0.0
  port: 8089

federatorInternal:
  host: 127.0.0.1
  port: 8097

brig:
  host: 0.0.0.0
  port: 8082

gundeck:
  host: 127.0.0.1
  port: 8086

cassandra:
  endpoint:
    host: 127.0.0.1
    port: 9042
  keyspace: gundeck_test

cassandraGalley:
  endpoint:
    host: 127.0.0.1
    port: 9042
  keyspace: galley_test

cassandraBrig:
  endpoint:
    host: 127.0.0.1
    port: 9042
  keyspace: brig_test

featureFlags:  # see #RefConfigOptions in `/docs/reference`
  sso: disabled-by-default
  legalhold: whitelist-teams-and-implicit-consent
  teamSearchVisibility: disabled-by-default
  appLock:
    defaults:
      status: enabled
      config:
        enforceAppLock: false
        inactivityTimeoutSecs: 60
  classifiedDomains:
    status: enabled
    config:
      domains: ["example.com"]
  fileSharing:
    defaults:
      status: enabled
      lockStatus: unlocked
  conferenceCalling:
    defaults:
      status: enabled
  outlookCalIntegration:
    defaults:
      status: disabled
      lockStatus: locked
  mlsE2EId:
    defaults:
      status: disabled
      config:
        verificationExpiration: 86400
        acmeDiscoveryUrl: null
      lockStatus: unlocked

postgresql:
  host: 127.0.0.1
  port: "5432"
  user: wire-server
  dbname: backendA
  password: posty-the-gres

postgresqlPool:
  size: 5
  acquisitionTimeout: 10s
  agingTimeout: 1d
  idlenessTimeout: 10m

federationDomain: example.org

rabbitmq:
  host: 127.0.0.1
  port: 5671
  vHost: /
  adminHost: 127.0.0.1
  adminPort: 15671
  enableTls: true
  caCert: test/resources/rabbitmq-ca.pem
  insecureSkipVerifyTls: false

backendNotificationPusher:
  pushBackoffMinWait: 1000 # 1ms
  pushBackoffMaxWait: 1000000 # 1s
  remotesRefreshInterval: 10000 # 10ms

migrateConversations: false
migrateConversationsOptions:
  pageSize: 10000
  parallelism: 2
migrateConversationCodes: false
migrateTeamFeatures: false

# Background jobs consumer configuration for integration
backgroundJobs:
  concurrency: 4
  jobTimeout: 5s
  maxAttempts: 3

postgresMigration:
  conversation: postgresql
  conversationCodes: postgresql
  teamFeatures: postgresql
