      #     #   -H "Authorization: Basic ${{ secrets.JIRA_API_TOKEN }}" \
      #     #   -H "Content-Type: application/json" \
      #     #   -d "{\"update\":{\"fixVersions\":[{\"add\":{\"name\":\"$FIX_VERSION\"}}]}}" \
      #     #   "https://your-jira-instance.atlassian.net/rest/api/2/issue/$ISSUE"
