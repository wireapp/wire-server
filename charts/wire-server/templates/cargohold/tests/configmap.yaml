apiVersion: v1
kind: ConfigMap
metadata:
  name: "cargohold-integration"
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  integration.yaml: |
    cargohold:
      host: cargohold
      port: {{ .Values.cargohold.service.internalPort }}
    {{- if .Values.cargohold.config.enableFederation }}
    federator:
      host: federator
      port: 8080
    {{- end }}
    brig:
      host: brig
      port: 8080
