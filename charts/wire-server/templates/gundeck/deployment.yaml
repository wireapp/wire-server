apiVersion: apps/v1
kind: Deployment
metadata:
  name: gundeck
  labels:
    app: gundeck
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.gundeck.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: {{ .Values.gundeck.replicaCount }}
  selector:
    matchLabels:
      app: gundeck
  template:
    metadata:
      labels:
        app: gundeck
        release: {{ .Release.Name }}
      annotations:
        # An annotation of the configmap checksum ensures changes to the configmap cause a redeployment upon `helm upgrade`
        checksum/configmap: {{ include (print .Template.BasePath "/gundeck/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print .Template.BasePath "/gundeck/secret.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.gundeck.terminationGracePeriodSeconds }}
      serviceAccountName: {{ .Values.gundeck.serviceAccount.name }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gundeck
      volumes:
        - name: "gundeck-config"
          configMap:
            name: "gundeck"
        {{- if .Values.gundeck.config.rabbitmq.tlsCaSecretRef }}
        - name: "rabbitmq-ca"
          secret:
            secretName: {{ .Values.gundeck.config.rabbitmq.tlsCaSecretRef.name }}
        {{- end }}
        {{- if eq (include "gundeck.useCassandraTLS" .Values.gundeck.config) "true" }}
        - name: "gundeck-cassandra"
          secret:
            secretName: {{ (include "gundeck.tlsSecretRef" .Values.gundeck.config | fromYaml).name }}
        {{- end}}
        {{- if eq (include "gundeck.configureRedisCa" .Values.gundeck.config) "true" }}
        - name: "redis-ca"
          secret:
            secretName: {{ include "gundeck.redisTlsSecretName" .Values.gundeck.config }}
        {{- end }}
        {{- if eq (include "gundeck.configureAdditionalRedisCa" .Values.gundeck.config) "true" }}
        - name: "additional-redis-ca"
          secret:
            secretName: {{ include "gundeck.additionalRedisTlsSecretName" .Values.gundeck.config }}
        {{- end }}
      containers:
        - name: gundeck
          image: "{{ .Values.gundeck.image.repository }}:{{ .Values.gundeck.image.tag }}"
          imagePullPolicy: {{ default "" .Values.gundeck.imagePullPolicy | quote }}
        {{- if eq (include "includeSecurityContext" .) "true" }}
          securityContext:
            {{- toYaml .Values.gundeck.podSecurityContext | nindent 12 }}
        {{- end }}
          volumeMounts:
          - name: "gundeck-config"
            mountPath: "/etc/wire/gundeck/conf"
          {{- if eq (include "gundeck.useCassandraTLS" .Values.gundeck.config) "true" }}
          - name: "gundeck-cassandra"
            mountPath: "/etc/wire/gundeck/cassandra"
          {{- end }}
          {{- if eq (include "gundeck.configureRedisCa" .Values.gundeck.config) "true" }}
          - name: "redis-ca"
            mountPath: "/etc/wire/gundeck/redis-ca/"
          {{- end }}
          {{- if eq (include "gundeck.configureAdditionalRedisCa" .Values.gundeck.config) "true" }}
          - name: "additional-redis-ca"
            mountPath: "/etc/wire/gundeck/additional-redis-ca/"
          {{- end }}
          {{- if .Values.gundeck.config.rabbitmq.tlsCaSecretRef }}
          - name: "rabbitmq-ca"
            mountPath: "/etc/wire/gundeck/rabbitmq-ca/"
          {{- end }}
          env:
          - name: RABBITMQ_USERNAME
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: rabbitmqUsername
          - name: RABBITMQ_PASSWORD
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: rabbitmqPassword
          {{- if hasKey .Values.gundeck.secrets "awsKeyId" }}
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: awsKeyId
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: awsSecretKey
          {{- end }}
          {{- if hasKey .Values.gundeck.secrets "redisUsername" }}
          - name: REDIS_USERNAME
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: redisUsername
          {{- end }}
          {{- if hasKey .Values.gundeck.secrets "redisPassword" }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: redisPassword
          {{- end }}
          {{- if hasKey .Values.gundeck.secrets "redisAdditionalWriteUsername" }}
          - name: REDIS_ADDITIONAL_WRITE_USERNAME
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: redisAdditionalWriteUsername
          {{- end }}
          {{- if hasKey .Values.gundeck.secrets "redisAdditionalWritePassword" }}
          - name: REDIS_ADDITIONAL_WRITE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: gundeck
                key: redisAdditionalWritePassword
          {{- end }}
          - name: AWS_REGION
            value: "{{ .Values.gundeck.config.aws.region }}"
          {{- with .Values.gundeck.config.proxy }}
          {{- if .httpProxy }}
          - name: http_proxy
            value: {{ .httpProxy | quote }}
          - name: HTTP_PROXY
            value: {{ .httpProxy | quote }}
          {{- end }}
          {{- if .httpsProxy }}
          - name: https_proxy
            value: {{ .httpsProxy | quote }}
          - name: HTTPS_PROXY
            value: {{ .httpsProxy | quote }}
          {{- end }}
          {{- if .noProxyList }}
          - name: no_proxy
            value: {{ join "," .noProxyList | quote }}
          - name: NO_PROXY
            value: {{ join "," .noProxyList | quote }}
          {{- end }}
          {{- end }} 
          ports:
            - containerPort: {{ .Values.gundeck.service.internalPort }}
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /i/status
              port: {{ .Values.gundeck.service.internalPort }}
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /i/status
              port: {{ .Values.gundeck.service.internalPort }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
{{ toYaml .Values.gundeck.resources | indent 12 }}
