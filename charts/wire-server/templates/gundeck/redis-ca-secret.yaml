---
{{- if not (empty .Values.gundeck.config.redis.tlsCa) }}
apiVersion: v1
kind: Secret
metadata:
  name: "gundeck-redis-ca"
  labels:
    app: gundeck
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
type: Opaque
data:
  ca.pem: {{ .Values.gundeck.config.redis.tlsCa | b64enc | quote }}
{{- end }}
---
{{- if not (empty .Values.gundeck.config.redis.additionalTlsCa) }}
apiVersion: v1
kind: Secret
metadata:
  name: "gundeck-additional-redis-ca"
  labels:
    app: gundeck
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
type: Opaque
data:
  ca.pem: {{ .Values.gundeck.config.redis.additionalTlsCa | b64enc | quote }}
{{- end }}
