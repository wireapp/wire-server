{{- $backgroundWorker := index .Values "background-worker" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "background-worker"
  labels:
    app: background-worker
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
data:
  {{- with $backgroundWorker.config }}
  background-worker.yaml: |
    logFormat: {{ .logFormat }}
    logLevel: {{ .logLevel }}

    backgroundWorker:
      host: 0.0.0.0
      port: {{ $backgroundWorker.service.internalPort }}

    federatorInternal:
      host: {{ .federatorInternal.host }}
      port: {{ .federatorInternal.port }}

    brig:
      host: {{ .brig.host }}
      port: {{ .brig.port }}
    galley:
      host: {{ .galley.host }}
      port: {{ .galley.port }}

    gundeck:
      host: {{ .gundeck.host }}
      port: {{ .gundeck.port }}
    spar:
      host: {{ .spar.host }}
      port: {{ .spar.port }}

    cassandra:
      endpoint:
        host: {{ .cassandra.host }}
        port: 9042
      keyspace: gundeck
      {{- if hasKey .cassandra "filterNodesByDatacentre" }}
      filterNodesByDatacentre: {{ .cassandra.filterNodesByDatacentre }}
      {{- end }}
      {{- if eq (include "useCassandraTLS" .cassandra) "true" }}
      tlsCa: /etc/wire/background-worker/cassandra-gundeck/{{- (include "gundeckTlsSecretRef" . | fromYaml).key }}
      {{- end }}

    {{- if .cassandraBrig }}
    cassandraBrig:
      endpoint:
        host: {{ .cassandraBrig.host }}
        port: 9042
      keyspace: brig
      {{- if hasKey .cassandraBrig "filterNodesByDatacentre" }}
      filterNodesByDatacentre: {{ .cassandraBrig.filterNodesByDatacentre }}
      {{- end }}
      {{- if eq (include "useCassandraTLS" .cassandraBrig) "true" }}
      tlsCa: /etc/wire/background-worker/cassandra-brig/{{- (include "brigTlsSecretRef" . | fromYaml).key }}
      {{- end }}
    {{- end }}

    {{- if .cassandraGalley }}
    cassandraGalley:
      endpoint:
        host: {{ .cassandraGalley.host }}
        port: 9042
      keyspace: galley
      {{- if hasKey .cassandraGalley "filterNodesByDatacentre" }}
      filterNodesByDatacentre: {{ .cassandraGalley.filterNodesByDatacentre }}
      {{- end }}
      {{- if eq (include "useCassandraTLS" .cassandraGalley) "true" }}
      tlsCa: /etc/wire/background-worker/cassandra-galley/{{- (include "galleyTlsSecretRef" . | fromYaml).key }}
      {{- end }}
    {{- end }}

    postgresql: {{ toYaml .postgresql | nindent 6 }}
    postgresqlPool: {{ toYaml .postgresqlPool | nindent 6 }}
    {{- if hasKey $backgroundWorker.secrets "pgPassword" }}
    postgresqlPassword: /etc/wire/background-worker/secrets/pgPassword
    {{- end }}

    federationDomain: {{ $backgroundWorker.config.federationDomain }}

    {{- with .rabbitmq }}
    rabbitmq:
      host: {{ .host }}
      port: {{ .port }}
      vHost: {{ .vHost }}
      {{- if $backgroundWorker.config.enableFederation }}
      adminHost: {{ default .host .adminHost }}
      adminPort: {{ .adminPort }}
      {{- end }}
      enableTls: {{ .enableTls }}
      insecureSkipVerifyTls: {{ .insecureSkipVerifyTls }}
      {{- if .tlsCaSecretRef }}
      caCert: /etc/wire/background-worker/rabbitmq-ca/{{ .tlsCaSecretRef.key }}
      {{- end }}
    {{- end }}

    migrateConversations: {{ .migrateConversations }}
    migrateConversationCodes: {{ .migrateConversationCodes }}
    migrateTeamFeatures: {{ .migrateTeamFeatures }}
    migrateConversationsOptions:
{{toYaml .migrateConversationsOptions | indent 6 }}

    backendNotificationPusher:
{{toYaml .backendNotificationPusher | indent 6 }}
    {{- with .backgroundJobs }}
    backgroundJobs:
{{ toYaml . | indent 6 }}
    {{- end }}

    settings:
      {{- if .Values.global.settings.maxTeamSize }}
      maxTeamSize: {{ .Values.global.settings.maxTeamSize }}
      {{- else }}
      maxTeamSize: {{ .settings.maxTeamSize }}
      {{- end }}
      maxFanoutSize: {{ .settings.maxFanoutSize }}
      {{- if .Values.global.settings.exposeInvitationURLsTeamAllowlist }}
      exposeInvitationURLsTeamAllowlist: {{ .Values.global.settings.exposeInvitationURLsTeamAllowlist }}
      {{- else }}
      exposeInvitationURLsTeamAllowlist: {{ .settings.exposeInvitationURLsTeamAllowlist }}
      {{- end }}
      {{- if .Values.global.settings.maxConvSize }}
      maxConvSize: {{ .Values.global.settings.maxConvSize }}
      {{- else }}
      maxConvSize: {{ .settings.maxConvSize }}
      {{- end }}
      {{- if .Values.global.settings.intraListing }}
      intraListing: {{ .Values.global.settings.intraListing }}
      {{- else }}
      intraListing: {{ .settings.intraListing }}
      {{- end }}
      {{- if or .Values.global.settings.conversationCodeURI .settings.conversationCodeURI }}
      {{- if .Values.global.settings.conversationCodeURI }}
      conversationCodeURI: {{ .Values.global.settings.conversationCodeURI | quote }}
      {{- else }}
      conversationCodeURI: {{ .settings.conversationCodeURI | quote }}
      {{- end }}
      {{- else if or .Values.global.settings.multiIngress .settings.multiIngress }}
      {{- if .Values.global.settings.multiIngress }}
      multiIngress: {{- toYaml .Values.global.settings.multiIngress | nindent 8 }}
      {{- else }}
      multiIngress: {{- toYaml .settings.multiIngress | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .settings.federationProtocols }}
      federationProtocols: {{ .settings.federationProtocols }}
      {{- end }}
      {{- if .Values.global.settings.guestLinkTTLSeconds }}
      guestLinkTTLSeconds: {{ .Values.global.settings.guestLinkTTLSeconds }}
      {{- else }}
      guestLinkTTLSeconds: {{ .settings.guestLinkTTLSeconds }}
      {{- end }}
      {{- if .Values.global.settings.passwordHashingOptions }}
      passwordHashingOptions: {{- toYaml .Values.global.settings.passwordHashingOptions | nindent 8 }}
      {{- else }}
      passwordHashingOptions: {{ toYaml .settings.passwordHashingOptions | nindent 8 }}
      {{- end }}
      {{- if .Values.global.settings.passwordHashingRateLimit }}
      passwordHashingRateLimit: {{- toYaml .Values.global.settings.passwordHashingRateLimit | nindent 8 }}
      {{- else }}
      passwordHashingRateLimit: {{ toYaml .settings.passwordHashingRateLimit | nindent 8 }}
      {{- end }}
      {{- if .settings.checkGroupInfo }}
      checkGroupInfo: {{ .settings.checkGroupInfo }}
      {{- end }}

    {{- if .postgresMigration }}
    postgresMigration: {{- toYaml .postgresMigration | nindent 6 }}
    {{- end }}
  {{- end }}
