apiVersion: apps/v1
kind: Deployment
metadata:
  name: background-worker
  labels:
    app: background-worker
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.backgroundWorker.replicaCount }}
  strategy:
    # Ensures only one version of the background worker is running at any given
    # moment. This means small downtime, but the background workers should be
    # able to catch up.
    type: Recreate
  selector:
    matchLabels:
      app: background-worker
  template:
    metadata:
      labels:
        app: background-worker
        release: {{ .Release.Name }}
      annotations:
        # An annotation of the configmap checksum ensures changes to the configmap cause a redeployment upon `helm upgrade`
        checksum/configmap: {{ include (print .Template.BasePath "/background-worker/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print .Template.BasePath "/background-worker/secret.yaml") . | sha256sum }}
        checksum/cassandra-secret: {{ include (print .Template.BasePath "/background-worker/cassandra-secret.yaml") . | sha256sum }}
        fluentbit.io/parser: json
    spec:
      serviceAccount: null
      serviceAccountName: null
      automountServiceAccountToken: false
      volumes:
        - name: "background-worker-config"
          configMap:
            name: "background-worker"
        - name: "background-worker-secrets"
          secret:
            secretName: "background-worker"
        {{- if eq (include "useGundeckCassandraTLS" .Values.backgroundWorker.config) "true" }}
        - name: "background-worker-cassandra-gundeck"
          secret:
            secretName: {{ (include "gundeckTlsSecretRef" .Values.backgroundWorker.config | fromYaml).name }}
        {{- end }}
        {{- if eq (include "useBrigCassandraTLS" .Values.backgroundWorker.config) "true" }}
        - name: "background-worker-cassandra-brig"
          secret:
            secretName: {{ (include "brigTlsSecretRef" .Values.backgroundWorker.config | fromYaml).name }}
        {{- end }}
        {{- if eq (include "useGalleyCassandraTLS" .Values.backgroundWorker.config) "true" }}
        - name: "background-worker-cassandra-galley"
          secret:
            secretName: {{ (include "galleyTlsSecretRef" .Values.backgroundWorker.config | fromYaml).name }}
        {{- end }}
        {{- if .Values.backgroundWorker.config.rabbitmq.tlsCaSecretRef }}
        - name: "rabbitmq-ca"
          secret:
            secretName: {{ .Values.backgroundWorker.config.rabbitmq.tlsCaSecretRef.name }}
        {{- end }}
        {{- if .Values.additionalVolumes }}
        {{ toYaml .Values.additionalVolumes | nindent 8 }}
        {{- end }}
      containers:
        - name: background-worker
          image: "{{ .Values.backgroundWorker.image.repository }}:{{ .Values.backgroundWorker.image.tag }}"
          imagePullPolicy: {{ default "" .Values.backgroundWorker.imagePullPolicy | quote }}
        {{- if eq (include "includeSecurityContext" .) "true" }}
          securityContext:
            {{- toYaml .Values.backgroundWorker.podSecurityContext | nindent 12 }}
        {{- end }}
          volumeMounts:
          - name: "background-worker-secrets"
            mountPath: "/etc/wire/background-worker/secrets"
          - name: "background-worker-config"
            mountPath: "/etc/wire/background-worker/conf"
          {{- if eq (include "useGundeckCassandraTLS" .Values.backgroundWorker.config) "true" }}
          - name: "background-worker-cassandra-gundeck"
            mountPath: "/etc/wire/background-worker/cassandra-gundeck"
          {{- end }}
          {{- if eq (include "useBrigCassandraTLS" .Values.backgroundWorker.config) "true" }}
          - name: "background-worker-cassandra-brig"
            mountPath: "/etc/wire/background-worker/cassandra-brig"
          {{- end }}
          {{- if eq (include "useGalleyCassandraTLS" .Values.backgroundWorker.config) "true" }}
          - name: "background-worker-cassandra-galley"
            mountPath: "/etc/wire/background-worker/cassandra-galley"
          {{- end }}
          {{- if .Values.backgroundWorker.config.rabbitmq.tlsCaSecretRef }}
          - name: "rabbitmq-ca"
            mountPath: "/etc/wire/background-worker/rabbitmq-ca/"
          {{- end }}
          {{- if .Values.additionalVolumeMounts }}
          {{ toYaml .Values.additionalVolumeMounts | nindent 10 }}
          {{- end }}
          env:
          - name: RABBITMQ_USERNAME
            valueFrom:
              secretKeyRef:
                name: background-worker
                key: rabbitmqUsername
          - name: RABBITMQ_PASSWORD
            valueFrom:
              secretKeyRef:
                name: background-worker
                key: rabbitmqPassword
          startupProbe:
            httpGet:
              scheme: HTTP
              path: /i/status
              port: {{ .Values.backgroundWorker.service.internalPort }}
            failureThreshold: 6
            periodSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /i/status
              port: {{ .Values.backgroundWorker.service.internalPort }}
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /i/status
              port: {{ .Values.backgroundWorker.service.internalPort }}
          resources:
{{ toYaml .Values.backgroundWorker.resources | indent 12 }}
