apiVersion: v1
kind: Secret
metadata:
  name: cannon
  labels:
    app: cannon
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
type: Opaque
data:
  rabbitmqUsername: {{ .Values.cannon.secrets.rabbitmq.username | b64enc | quote }}
  rabbitmqPassword: {{ .Values.cannon.secrets.rabbitmq.password | b64enc | quote }}

