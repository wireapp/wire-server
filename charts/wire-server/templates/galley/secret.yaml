apiVersion: v1
kind: Secret
metadata:
  name: galley
  labels:
    app: galley
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
type: Opaque
data:
  {{- if .Values.galley.secrets.mlsPrivateKeys }}
  removal_ed25519.pem: {{ .Values.galley.secrets.mlsPrivateKeys.removal.ed25519 | b64enc | quote }}
  removal_ecdsa_secp256r1_sha256.pem: {{ .Values.galley.secrets.mlsPrivateKeys.removal.ecdsa_secp256r1_sha256 | b64enc | quote }}
  removal_ecdsa_secp384r1_sha384.pem: {{ .Values.galley.secrets.mlsPrivateKeys.removal.ecdsa_secp384r1_sha384 | b64enc | quote }}
  removal_ecdsa_secp521r1_sha512.pem: {{ .Values.galley.secrets.mlsPrivateKeys.removal.ecdsa_secp521r1_sha512 | b64enc | quote }}
  {{- end -}}

  {{- if $.Values.galley.config.enableFederation }}
  {{- if not $.Values.galley.secrets.rabbitmq }}
  {{- fail "galley.secrets.rabbitmq must be configured when enableFederation is true" }}
  {{- end }}
  rabbitmqUsername: {{ .Values.galley.secrets.rabbitmq.username | b64enc | quote }}
  rabbitmqPassword: {{ .Values.galley.secrets.rabbitmq.password | b64enc | quote }}
  {{- end }}

  {{- if .Values.galley.secrets.pgPassword }}
  pgPassword: {{ .Values.galley.secrets.pgPassword | b64enc | quote }}
  {{- end }}
