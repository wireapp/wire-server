# Default values for wire-server.

# Tags allow to enable/disable certain components of wire-server as defined in requirements.yaml
# https://docs.helm.sh/developing_charts/#tags-and-condition-fields-in-requirements-yaml
# tags:
#   services: true

tags:
  legalhold: false
  federation: false 
  backoffice: false
  mlsstats: false
  integration: false

galley:
  replicaCount: 3
  image:
    repository: quay.io/wire/galley
    tag: do-not-use
    schemaRepository: quay.io/wire/galley-schema
  service:
    externalPort: 8080
    internalPort: 8080
  metrics:
    serviceMonitor:
      enabled: false
  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "500Mi"
  # This is not supported for production use, only here for testing:
  # preStop:
  #  exec:
  #   command: ["sh", "-c", "curl http://acme.example"]
  config:
    logLevel: Info
    logFormat: StructuredJSON
    logNetStrings: false
    enableFederation: false # keep in sync with background-worker, brig and cargohold charts' config.enableFederation as well as wire-server chart's tags.federation
    cassandra:
      host: aws-cassandra
      replicaCount: 3
    #   To enable TLS provide a CA:
    #   tlsCa: <CA in PEM format (can be self-signed)>
    #
    #   Or refer to an existing secret (containing the CA):
    #   tlsCaSecretRef:
    #     name: <secret-name>
    #     key: <ca-attribute>

    # Postgres connection settings
    #
    # Values are described in https://www.postgresql.org/docs/17/libpq-connect.html#LIBPQ-PARAMKEYWORDS
    # To set the password via a brig secret see `secrets.pgPassword`.
    #
    # `additionalVolumeMounts` and `additionalVolumes` can be used to mount
    # additional files (e.g. certificates) into the galley container. This way
    # does not work for password files (parameter `passfile`), because
    # libpq-connect requires access rights (mask 0600) for them that we cannot
    # provide for random uids.
    #
    # Below is an example configuration we're using for our CI tests.
    postgresql:
      host: postgresql # DNS name without protocol
      port: "5432"
      user: wire-server
      dbname: wire-server
    postgresqlPool:
      size: 100
      acquisitionTimeout: 10s
      agingTimeout: 1d
      idlenessTimeout: 10m

    # Not used if enableFederation is false
    rabbitmq:
      host: rabbitmq
      port: 5672
      vHost: /
      enableTls: false
      insecureSkipVerifyTls: false
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>

    postgresMigration:
      conversation: cassandra
      conversationCodes: cassandra
      teamFeatures: cassandra
    settings:
      httpPoolSize: 128
      maxTeamSize: 10000
      exposeInvitationURLsTeamAllowlist: []
      maxConvSize: 500
      intraListing: true
      # Either `conversationCodeURI` or `multiIngress` must be set
      #
      # `conversationCodeURI` is the URI prefix for conversation invitation links
      # It should be of form https://{ACCOUNT_PAGES}/conversation-join/
      conversationCodeURI: null
      #
      # `multiIngress` is a `Z-Host` depended setting of conversationCodeURI.
      # Use this only if you want to expose the instance on multiple ingresses.
      # If set it must a map from `Z-Host` to URI prefix
      # Example:
      # multiIngress:
      #    wire.example: https://accounts.wire.example/conversation-join/
      #    example.net: https://accounts.example.net/conversation-join/
      multiIngress: null
      # Disable one ore more API versions. Please make sure the configuration value is the same in all these charts:
      # brig, cannon, cargohold, galley, gundeck, proxy, spar.
      disabledAPIVersions: [development]
      # The lifetime of a conversation guest link in seconds. Must be a value 0 < x <= 31536000 (365 days)
      # Default is 31536000 (365 days) if not set
      guestLinkTTLSeconds: 31536000
      passwordHashingOptions:
        algorithm: scrypt # or argon2id
        # When algorithm is argon2id, these can be configured:
        # iterations: <iterations>
        # parallelism: <paralellism>
        # memory: <memory used in KiB>
      passwordHashingRateLimit:
        ipAddrLimit:
          burst: 5
          inverseRate: 300000000 # 5 mins, makes it 12 reqs/hour
        userLimit:
          burst: 5
          inverseRate: 60000000 # 1 min, makes it 60 req/hour
        internalLimit:
          burst: 10
          inverseRate: 0 # No rate limiting for internal use
        ipv4CidrBlock: 32 # Only block individual IP addresses
        ipv6CidrBlock: 64 # Block /64 range at a time.
        ipAddressExceptions: []
        maxRateLimitedKeys: 100000 # Estimated memory usage: 4 MB

      checkGroupInfo: false

      meetings:
        validityPeriod: "48h"

      # To disable proteus for new federated conversations:
      # federationProtocols: ["mls"]

      featureFlags: # see #RefConfigOptions in `/docs/reference` (https://github.com/wireapp/wire-server/)
        appLock:
          defaults:
            config:
              enforceAppLock: false
              inactivityTimeoutSecs: 60
            status: enabled
        classifiedDomains:
          config:
            domains: []
          status: disabled
        conferenceCalling:
          defaults:
            status: enabled
            lockStatus: locked
        conversationGuestLinks:
          defaults:
            lockStatus: unlocked
            status: enabled
        fileSharing:
          defaults:
            lockStatus: unlocked
            status: enabled
        enforceFileDownloadLocation:
          defaults:
            lockStatus: locked
            status: disabled
            config: {}
        legalhold: disabled-by-default
        mls:
          defaults:
            status: disabled
            config:
              protocolToggleUsers: []
              defaultProtocol: proteus
              allowedCipherSuites: [2]
              defaultCipherSuite: 2
              supportedProtocols: [proteus, mls] # must contain defaultProtocol
              groupInfoDiagnostics: false
            lockStatus: unlocked
        searchVisibilityInbound:
          defaults:
            status: disabled
        selfDeletingMessages:
          defaults:
            config:
              enforcedTimeoutSeconds: 0
            lockStatus: unlocked
            status: enabled
        sndFactorPasswordChallenge:
          defaults:
            lockStatus: locked
            status: disabled
        sso: disabled-by-default
        teamSearchVisibility: disabled-by-default
        validateSAMLemails:
          defaults:
            status: enabled
        outlookCalIntegration:
          defaults:
            status: disabled
            lockStatus: locked
        mlsE2EId:
          defaults:
            status: disabled
            config:
              verificationExpiration: 86400
              acmeDiscoveryUrl: null
            lockStatus: unlocked
        mlsMigration:
          defaults:
            status: disabled
            config:
              startTime: null # "2029-05-16T10:11:12.123Z"
              finaliseRegardlessAfter: null # "2029-10-17T00:00:00.000Z"
              usersThreshold: 100
              clientsThreshold: 100
            lockStatus: locked
        limitedEventFanout:
          defaults:
            status: disabled
        domainRegistration:
          defaults:
            status: disabled
            lockStatus: locked
        channels:
          defaults:
            status: disabled
            config:
              allowed_to_create_channels: team-members
              allowed_to_open_channels: team-members
            lockStatus: locked
        cells:
          defaults:
            status: disabled
            lockStatus: locked
            config:
              channels:
                enabled: true
                default: enabled
              groups:
                enabled: true
                default: enabled
              one2one:
                enabled: true
                default: enabled
              users:
                externals: true
                guests: false
              collabora:
                enabled: false
              publicLinks:
                enableFiles: true
                enableFolders: true
                enforcePassword: false
                enforceExpirationMax: 0
                enforceExpirationDefault: 0
              storage:
                perFileQuotaBytes: "100000000"
                recycle:
                  autoPurgeDays: 30
                  disable: false
                  allowSkip: false
              metadata:
                namespaces:
                  usermetaTags:
                    defaultValues: []
                    allowFreeValues: true
        cellsInternal:
          defaults:
            status: enabled
            lockStatus: unlocked
            config:
              backend:
                url: https://cells-beta.wire.com
              collabora:
                edition: COOL
              storage:
                perUserQuotaBytes: "1000000000000"
        allowedGlobalOperations:
          status: enabled
          config:
            mlsConversationReset: false
        assetAuditLog:
          status: disabled
        consumableNotifications:
          defaults:
            status: disabled
            lockStatus: locked
        chatBubbles:
          defaults:
            status: disabled
            lockStatus: locked
        apps:
          defaults:
            status: disabled
            lockStatus: locked
        simplifiedUserConnectionRequestQRCode:
          defaults:
            status: enabled
            lockStatus: unlocked
        stealthUsers:
          defaults:
            status: disabled
            lockStatus: locked
        meetings:
          defaults:
            status: enabled
            lockStatus: unlocked
        meetingsPremium:
          defaults:
            status: disabled
            lockStatus: locked
    aws:
      region: "eu-west-1"
    proxy: {}
  serviceAccount:
    # When setting this to 'false', either make sure that a service account named
    # 'galley' exists or change the 'name' field to 'default'
    create: true
    name: galley
    annotations: {}
    automountServiceAccountToken: true

  secrets: {}

  podSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  tests:
    config:
      {}
      # uploadXml:
      #   baseUrl: s3://bucket/path/

    secrets:
      # uploadXmlAwsAccessKeyId: <key-id>
      # uploadXmlAwsSecretAccessKey: <secret>

