gundeck:
  replicaCount: 3
  image:
    repository: quay.io/wire/gundeck
    tag: do-not-use
  service:
    externalPort: 8080
    internalPort: 8080
  imagePullPolicy: ""
  metrics:
    serviceMonitor:
      enabled: false
  resources:
    requests:
      memory: "300Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"

  # Should be greater than Warp's graceful shutdown (default 30s).
  terminationGracePeriodSeconds: 40
  config:
    logLevel: Info
    logFormat: StructuredJSON
    logNetStrings: false
    rabbitmq:
      host: rabbitmq
      port: 5672
      vHost: /
      enableTls: false
      insecureSkipVerifyTls: false
    cassandra:
      host: aws-cassandra
      # To enable TLS provide a CA:
      # tlsCa: <CA in PEM format (can be self-signed)>
      #
      # Or refer to an existing secret (containing the CA):
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>
    redis:
      host: redis-ephemeral
      port: 6379
      connectionMode: "master" # master | cluster
      enableTls: false
      insecureSkipVerifyTls: false
      # To configure custom TLS CA, please provide one of these:
      # tlsCa: <CA in PEM format (can be self-signed)>
      #
      # Or refer to an existing secret (containing the CA):
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>

    # To enable additional writes during a migration:
    # redisAdditionalWrite:
    #   host: redis-two
    #   port: 6379
    #   connectionMode: master
    #   enableTls: false
    #   insecureSkipVerifyTls: false
    #
    # # To configure custom TLS CA, please provide one of these:
    # # tlsCa: <CA in PEM format (can be self-signed)>
    # #
    # # Or refer to an existing secret (containing the CA):
    # # tlsCaSecretRef:
    # #   name: <secret-name>
    # #   key: <ca-attribute>
    aws:
      region: "eu-west-1"
    proxy: {}
    # perNativePushConcurrency: 32
    maxConcurrentNativePushes:
      soft: 1000
    # Disable one ore more API versions. Please make sure the configuration value is the same in all these charts:
    # brig, cannon, cargohold, galley, gundeck, proxy, spar.
    disabledAPIVersions: [development]

    # Maximum number of bytes loaded into memory when fetching (referenced) payloads.
    # Gundeck will return a truncated page if the whole page's payload sizes would exceed this limit in total.
    # Inlined payloads can cause greater payload sizes to be loaded into memory regardless of this setting.
    # Tune this to trade off memory usage VS number of requests for gundeck workers.
    maxPayloadLoadSize: 5242880
    # Cassandra page size for fetching notifications. Does not directly effect the
    # page size request in the client API. A lower number will reduce the amount
    # by which setMaxPayloadLoadSize is exceeded when loading notifications from
    # the database if notifications have inlined payloads.
    internalPageSize: 100

    # TTL of stored notifications in Seconds. After this period, notifications
    # will be deleted and thus not delivered.
    # The default is 28 days.
    notificationTTL: 2419200

    # To enable cells notifications
    # cellsEventQueue: cells_events

  serviceAccount:
    # When setting this to 'false', either make sure that a service account named
    # 'gundeck' exists or change the 'name' field to 'default'
    create: true
    name: gundeck
    annotations: {}
    automountServiceAccountToken: true

  secrets: {}

  podSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  tests:
    config: {}
    # config:
    #   uploadXml:
    #     baseUrl: s3://bucket/path/
    # secrets:
    #   uploadXmlAwsAccessKeyId: <key-id>
    #   uploadXmlAwsSecretAccessKey: <secret>

spar:
  replicaCount: 3
  image:
    repository: quay.io/wire/spar
    tag: do-not-use
  imagePullPolicy: ""
  metrics:
    serviceMonitor:
      enabled: false
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
  service:
    externalPort: 8080
    internalPort: 8080
  config:
    cassandra:
      host: aws-cassandra
      # To enable TLS provide a CA:
      # tlsCa: <CA in PEM format (can be self-signed)>
      #
      # Or refer to an existing secret (containing the CA):
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>
    richInfoLimit: 5000
    maxScimTokens: 0

    # Enables the `/sso/get-by-email` endpoint which returns the matching IdP for
    # an email address of a team member.
    enableIdPByEmailDiscovery: false

    logLevel: Info
    logFormat: StructuredJSON
    logNetStrings: false
    maxttlAuthreq: 7200
    maxttlAuthresp: 7200
    proxy: {}

    # Disable one ore more API versions. Please make sure the configuration value is the same in all these charts:
    # brig, cannon, cargohold, galley, gundeck, proxy, spar.
    disabledAPIVersions: [development]

    # SAML - ServiceProvider configuration
    # Usually, one would configure one set of options for a single domain. For
    # multi-ingress setups (one backend is available through multiple domains),
    # configure a map with the nginz domain as key.
    #
    # Single domain configuration
    # appUri: <webapp-uri> # E.g. https://webapp.<domain>
    # ssoUri: <service-provider-uri> # E.g. https://nginz-https.<domain>/sso
    # contacts:
    #   - type: <contact-type> # One of ContactTechnical, ContactSupport, ContactAdministrative, ContactBilling, ContactOther
    #     company: <company-name> # Optional
    #     email: <contact-email-address> # Optional
    #     givenName: <name> # Optional
    #     surname: <name> # Optional
    #     phone: <phone-number-string> # Optional
    #
    # Multi-ingress configuration
    # domainConfigs:
    #   <domain1>: # The domain of the incoming nginz-https host. E.g. nginz-https.<domain>
    #     appUri: <webapp-uri> # E.g. https://webapp.<domain>
    #     ssoUri: <service-provider-uri> # E.g. https://nginz-https.<domain>/sso
    #     contacts:
    #       - type: <contact-type> # One of ContactTechnical, ContactSupport, ContactAdministrative, ContactBilling, ContactOther
    #         company: <company-name> # Optional
    #         email: <contact-email-address> # Optional
    #         givenName: <name> # Optional
    #         surname: <name> # Optional
    #         phone: <phone-number-string> # Optional
    #   <domain2>:
    #     ...

    # SCIM base URI (by default deduced from single-domain spSsoUri, must be set
    # for multi-ingress)
    # scimBaseUri: <uri>

  podSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  tests:
    config: {}
    # config:
    #   uploadXml:
    #     baseUrl: s3://bucket/path/
    # secrets:
    #   uploadXmlAwsAccessKeyId: <key-id>
    #   uploadXmlAwsSecretAccessKey: <secret>

background-worker:
  replicaCount: 1
  image:
    repository: quay.io/wire/background-worker
    tag: do-not-use
  service:
    internalPort: 8080
    externalPort: 8080
  # FUTUREWORK: Review these values when we have some experience
  resources:
    requests:
      memory: "200Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
  metrics:
    serviceMonitor:
      enabled: false
  config:
    logLevel: Info
    logFormat: StructuredJSON
    enableFederation: false # keep in sync with brig, cargohold and galley charts' config.enableFederation as well as wire-server chart's tags.federation
    brig:
      host: brig
      port: 8080
    galley:
      host: galley
      port: 8080
    gundeck:
      host: gundeck
      port: 8080
    federatorInternal:
      host: federator
      port: 8080
    spar:
      host: spar
      port: 8080
    rabbitmq:
      host: rabbitmq
      port: 5672
      vHost: /
      adminPort: 15672
      enableTls: false
      insecureSkipVerifyTls: false
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>
    # Cassandra clusters used by background-worker
    cassandra:
      host: aws-cassandra
    cassandraGalley:
      host: aws-cassandra
    cassandraBrig:
      host: aws-cassandra

    # Postgres connection settings
    #
    # Values are described in https://www.postgresql.org/docs/17/libpq-connect.html#LIBPQ-PARAMKEYWORDS
    # To set the password via a brig secret see `secrets.pgPassword`.
    #
    # `additionalVolumeMounts` and `additionalVolumes` can be used to mount
    # additional files (e.g. certificates) into the brig container. This way
    # does not work for password files (parameter `passfile`), because
    # libpq-connect requires access rights (mask 0600) for them that we cannot
    # provide for random uids.
    #
    # Below is an example configuration we're using for our CI tests.
    postgresql:
      host: postgresql # DNS name without protocol
      port: "5432"
      user: wire-server
      dbname: wire-server
    postgresqlPool:
      size: 5
      acquisitionTimeout: 10s
      agingTimeout: 1d
      idlenessTimeout: 10m

    # Setting this to `true` will start conversation migration to postgresql.
    #
    # NOTE: It is very important that galley be configured to with
    # `settings.postgresMigration.conversation` with `migration-to-postgresql`
    # before setting this to `true`.
    migrateConversations: false
    migrateConversationsOptions:
      pageSize: 10000
      parallelism: 2
    # This will start the migration of conversation codes.
    # It's important to set `settings.postgresMigration.conversationCodes` to `migration-to-postgresql`
    # before starting the migration.
    migrateConversationCodes: false
    # This will start the migration of team features.
    # It's important to set `settings.postgresMigration.teamFeatures` to `migration-to-postgresql`
    # before starting the migration.
    migrateTeamFeatures: false

    backendNotificationPusher:
      pushBackoffMinWait: 10000 # in microseconds, so 10ms
      pushBackoffMaxWait: 300000000 # microseconds, so 300s
      remotesRefreshInterval: 300000000 # microseconds, so 300s

    # Background jobs consumer configuration
    backgroundJobs:
      # Maximum number of in-flight jobs per process
      concurrency: 8
      # Per-attempt timeout in seconds
      jobTimeout: 60s
      # Total attempts, including the first try
      maxAttempts: 3

    # Controls where conversation data is stored/accessed
    postgresMigration:
      conversation: cassandra
      conversationCodes: cassandra
      teamFeatures: cassandra

  secrets:
    {}
    # pgPassword: <postgres-password>

  podSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

brig:
  replicaCount: 3
  image:
    repository: quay.io/wire/brig
    tag: do-not-use
  service:
    externalPort: 8080
    internalPort: 8080
  resources:
    requests:
      memory: "200Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
  metrics:
    serviceMonitor:
      enabled: false
  livenessProbe:
    # Maximum allowed network connections before forcing restart (mitigates connection/memory leaks)
    maxConnections: 500
  # This is not supported for production use, only here for testing:
  # preStop:
  #  exec:
  #   command: ["sh", "-c", "curl http://acme.example"]
  config:
    logLevel: Info
    logFormat: StructuredJSON
    logNetStrings: false
    cassandra:
      host: aws-cassandra
    #   To enable TLS provide a CA:
    #   tlsCa: <CA in PEM format (can be self-signed)>
    #
    #   Or refer to an existing secret (containing the CA):
    #   tlsCaSecretRef:
    #     name: <secret-name>
    #     key: <ca-attribute>
  
    elasticsearch:
      scheme: http
      host: elasticsearch-client
      port: 9200
      index: directory
      insecureSkipVerifyTls: false
      #   To configure custom TLS CA, please provide one of these:
      #   tlsCa: <CA in PEM format (can be self-signed)>
      #
      #   Or refer to an existing secret (containing the CA):
      #   tlsCaSecretRef:
      #     name: <secret-name>
      #     key: <ca-attribute>
      additionalWriteScheme: http
      # additionalWriteHost: <host>
      additionalWritePort: 9200
      # additionalWriteIndex: <index>
      additionalInsecureSkipVerifyTls: false
    #   To configure custom TLS CA, please provide one of these:
    #   additionalTlsCa: <CA in PEM format (can be self-signed)>
    #
    #   Or refer to an existing secret (containing the CA):
    #   additionalTlsCaSecretRef:
    #     name: <secret-name>
    #     key: <ca-attribute>
    aws:
      region: "eu-west-1"
      sesEndpoint: https://email.eu-west-1.amazonaws.com
      sqsEndpoint: https://sqs.eu-west-1.amazonaws.com
      # dynamoDBEndpoint: https://dynamodb.eu-west-1.amazonaws.com
    # -- If set to false,  'dynamoDBEndpoint' _must_ be set.
    randomPrekeys: true
    useSES: true
    multiSFT:
      enabled: false # keep multiSFT default in sync with sft chart's multiSFT.enabled
    enableFederation: false # keep in sync with background-worker, cargohold and galley charts' config.enableFederation as well as wire-server chart's tags.federation
    rabbitmq:
      host: rabbitmq
      port: 5672
      vHost: /
      enableTls: false
      insecureSkipVerifyTls: false
      # tlsCaSecretRef:
      #   name: <secret-name>
      #   key: <ca-attribute>
  
    # Postgres connection settings
    #
    # Values are described in https://www.postgresql.org/docs/17/libpq-connect.html#LIBPQ-PARAMKEYWORDS
    # To set the password via a brig secret see `secrets.pgPassword`.
    #
    # `additionalVolumeMounts` and `additionalVolumes` can be used to mount
    # additional files (e.g. certificates) into the brig container. This way
    # does not work for password files (parameter `passfile`), because
    # libpq-connect requires access rights (mask 0600) for them that we cannot
    # provide for random uids.
    #
    # Below is an example configuration we're using for our CI tests.
    postgresql:
      host: postgresql # DNS name without protocol
      port: "5432"
      user: wire-server
      dbname: wire-server
    postgresqlPool:
      size: 100
      acquisitionTimeout: 10s
      agingTimeout: 1d
      idlenessTimeout: 10m
  
    emailSMS:
      general:
        templateBranding:
          brand: Wire
          brandUrl: https://wire.com
          brandLabelUrl: wire.com
          brandLogoUrl: https://wire.com/p/img/email/logo-email-black.png
          brandService: Wire Service Provider
          copyright: © WIRE SWISS GmbH
          misuse: misuse@wire.com
          legal: https://wire.com/legal/
          forgot: https://wire.com/forgot/
          support: https://support.wire.com/
    authSettings:
      keyIndex: 1
      userTokenTimeout: 4838400
      sessionTokenTimeout: 86400
      accessTokenTimeout: 900
      providerTokenTimeout: 900
      legalholdUserTokenTimeout: 4838400
      legalholdAccessTokenTimeout: 900
    # sft:
    #   sftBaseDomain: sft.wire.example.com
    #   sftSRVServiceName: sft
    #   sftDiscoveryIntervalSeconds: 10
    #   sftListLength: 20
    #   sftToken:
    #     ttl: 120
    #     secret: /etc/wire/brig/secrets/sftTokenSecret # this is the default path for secret.sftTokenSecret
    optSettings:
      setActivationTimeout: 1209600
      setTeamInvitationTimeout: 1814400
      setUserMaxConnections: 1000
      setCookieInsecure: false
      setUserCookieRenewAge: 1209600
      setUserCookieLimit: 32
      setUserCookieThrottle:
        stdDev: 3000
        retryAfter: 86400
      setRichInfoLimit: 5000
      setDefaultUserLocale: en
      setMaxTeamSize: 10000
      setMaxConvSize: 500
      # Allowed values: https://github.com/wireapp/wire-server/blob/0126651a25aabc0c5589edc2b1988bb06550a03a/services/brig/src/Brig/Options.hs#L304-L306
      # Description: https://github.com/wireapp/wire-server/blob/0126651a25aabc0c5589edc2b1988bb06550a03a/services/brig/src/Brig/Options.hs#L290-L299
      setEmailVisibility: visible_to_self
      setPropertyMaxKeyLen: 1024
      setPropertyMaxValueLen: 524288
      setDeleteThrottleMillis: 100
      # Allow search within same team only. Default: false
      # setSearchSameTeamOnly: false|true
      # Set max number of user clients. Default: 7
      # setUserMaxPermClients: <int>
      # Customer extensions.  If this is not part of your contract with wire, use at your own risk!
      # Details: https://github.com/wireapp/wire-server/blob/3d5684023c54fe580ab27c11d7dae8f19a29ddbc/services/brig/src/Brig/Options.hs#L465-L503
      # setCustomerExtensions:
      #   domainsBlockedForRegistration:
      #   - wire.example
      set2FACodeGenerationDelaySecs: 300 # 5 minutes
      setNonceTtlSecs: 300 # 5 minutes
      setDpopMaxSkewSecs: 1
      setDpopTokenExpirationTimeSecs: 300 # 5 minutes
      setOAuthAuthCodeExpirationTimeSecs: 300 # 5 minutes
      setOAuthAccessTokenExpirationTimeSecs: 900 # 15 minutes
      setOAuthRefreshTokenExpirationTimeSecs: 14515200 # 24 weeks
      setOAuthEnabled: true
      setOAuthMaxActiveRefreshTokens: 10
      # Disable one ore more API versions. Please make sure the configuration value is the same in all these charts:
      # brig, cannon, cargohold, galley, gundeck, proxy, spar.
      setDisabledAPIVersions: [development]
      setFederationStrategy: allowNone
      setFederationDomainConfigsUpdateFreq: 10
      setPasswordHashingOptions:
        algorithm: scrypt # or argon2id
        # When algorithm is argon2id, these can be configured:
        # iterations: <iterations>
        # parallelism: <paralellism>
        # memory: <memory used in KiB>
      setPasswordHashingRateLimit:
        ipAddrLimit:
          burst: 5
          inverseRate: 300000000 # 5 mins, makes it 12 reqs/hour
        userLimit:
          burst: 5
          inverseRate: 60000000 # 1 min, makes it 60 req/hour
        internalLimit:
          burst: 10
          inverseRate: 0 # No rate limiting for internal use
        ipv4CidrBlock: 32 # Only block individual IP addresses
        ipv6CidrBlock: 64 # Block /64 range at a time.
        ipAddressExceptions: []
        maxRateLimitedKeys: 100000 # Estimated memory usage: 4 MB
      # setAuditLogEmailRecipient: security@wire.com
      setEphemeralUserCreationEnabled: true
  
    smtp:
      passwordFile: /etc/wire/brig/secrets/smtp-password.txt
    proxy: {}
    wireServerEnterprise:
      enabled: false
  
  turnStatic:
    v1:
      - turn:localhost:3478
    v2:
      - turn:localhost:3478
      - turn:localhost:3478?transport=tcp
  
  turn:
    serversSource: files # files | dns
    # baseDomain: turn.wire.example # Must be configured if serversSource is dns
    discoveryIntervalSeconds: 10 # Used only if serversSource is dns
  
  serviceAccount:
    # When setting this to 'false', either make sure that a service account named
