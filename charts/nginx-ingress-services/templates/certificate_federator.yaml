{{- if and .Values.federator.enabled (not .Values.tls.enabled) }}
{{- fail "TLS is required by federator. Either disable federation or enable tls." }}
{{- end }}
{{- if and .Values.federator.enabled .Values.config.isAdditionalIngress -}}
  {{ fail "Federation and multi-backend-domain (multi-ingress) cannot be configured together." }}
{{- end -}}
{{- if and .Values.federator.enabled (and .Values.tls.enabled .Values.tls.useCertManager) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "federator-{{ include "nginx-ingress-services.zone" . | replace "." "-" }}-csr"
  namespace: {{ .Release.Namespace }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  issuerRef:
    {{- if .Values.federator.tls.issuer.name }}
    name: {{ .Values.federator.tls.issuer.name | quote }}
    kind: {{ .Values.federator.tls.issuer.kind | default .Values.tls.issuer.kind }}
    {{- if .Values.federator.tls.issuer.group }}
    group: {{ .Values.federator.tls.issuer.group }}
    {{- end }}
    {{- else }}
    name: {{ include "nginx-ingress-services.getIssuerName" . | quote }}
    kind: {{ .Values.tls.issuer.kind }}
    {{- end }}
  usages:
    - server auth
    - client auth
  duration: {{ .Values.federator.tls.duration }}
  renewBefore: {{ .Values.federator.tls.renewBefore }}
  isCA: false
  secretName: federator-certificate-secret
  privateKey:
    algorithm: ECDSA
    size: 256         # hs-tls only supports p256
    encoding: PKCS1
    rotationPolicy: {{ .Values.federator.tls.privateKey.rotationPolicy }}
  dnsNames:
    - "{{ or .Values.config.dns.certificateDomain .Values.config.dns.federator }}"
{{- end -}}
