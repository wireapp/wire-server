---
apiVersion: v1
kind: Service
metadata:
  name: integration-headless
spec:
  selector:
    app: integration-integration
  type: ClusterIP
  clusterIP: None

---
apiVersion: v1
kind: Service
metadata:
  name: integration
spec:
  ports:
  {{- range $name, $dynamicBackend := .Values.config.dynamicBackends }}
  - name: dyn-fed-{{ $name }}
    port: {{ $dynamicBackend.federatorExternalPort }}
    protocol: TCP
    targetPort: {{ $dynamicBackend.federatorExternalPort }}
  {{- end }}
  selector:
    app: integration-integration
  type: ClusterIP

