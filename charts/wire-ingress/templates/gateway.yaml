{{- if .Values.gateway.create }}
{{- if not .Values.gateway.className }}
{{- fail "gateway.className must be set when gateway.create is true (set it to the name of your GatewayClass, e.g. 'envoy')" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "wire-ingress.getGatewayName" . | quote }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  gatewayClassName: {{ .Values.gateway.className | quote }}
  {{- $hasAnnotations := .Values.gateway.infrastructure.annotations }}
  {{- $hasEnvoyProxy := ne .Values.gateway.serviceType "LoadBalancer" }}
  {{- if (or $hasAnnotations $hasEnvoyProxy) }}
  infrastructure:
    {{- if $hasAnnotations }}
    annotations:
      {{- toYaml .Values.gateway.infrastructure.annotations | nindent 6 }}
    {{- end }}
    {{- if $hasEnvoyProxy }}
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "wire-ingress.getGatewayName" . | quote }}
    {{- end }}
  {{- end }}
  listeners:
    - name: https
      port: {{ .Values.gateway.listeners.https.port }}
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "wire-ingress.getCertificateSecretName" . | quote }}
            kind: Secret
    {{- if .Values.federator.enabled }}
    - name: federator
      port: {{ .Values.gateway.listeners.https.port }}
      protocol: HTTPS
      hostname: {{ required "config.dns.federator is required when federator.enabled is true" .Values.config.dns.federator | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ required "federator.tls.secretName is required when federator.enabled is true" .Values.federator.tls.secretName | quote }}
            kind: Secret
    {{- end }}
    {{- if .Values.gateway.listeners.http.enabled }}
    - name: http
      port: {{ .Values.gateway.listeners.http.port }}
      protocol: HTTP
    {{- end }}
{{- end }}
