apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wire-ingress.fullname" . }}-nginz
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  parentRefs:
    - name: {{ include "wire-ingress.getGatewayName" . | quote }}
      namespace: {{ .Release.Namespace | quote }}
      kind: Gateway
      sectionName: https
  hostnames:
    - {{ required "config.dns.https is required" .Values.config.dns.https | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginz
          port: {{ .Values.services.nginz.httpPort }}
          kind: Service
