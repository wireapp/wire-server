{{- if .Values.federator.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wire-ingress.fullname" . }}-federator
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  parentRefs:
    - name: {{ include "wire-ingress.getGatewayName" . | quote }}
      namespace: {{ .Release.Namespace | quote }}
      kind: Gateway
      sectionName: federator
  hostnames:
    - {{ .Values.config.dns.federator | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: federator
          port: {{ .Values.service.federator.externalPort }}
          kind: Service
{{- end }}
