# Default values for wire-ingress

gateway:
  # If true, a Gateway resource is created by this chart.
  # If false, set gateway.name to reference an existing Gateway.
  create: true
  # Name of the Gateway. Defaults to <release-name>-wire-ingress-gateway if empty.
  name: ""
  # Name of the GatewayClass installed by the Envoy Gateway controller.
  className: ""
  # Annotations to add to the LoadBalancer Service created by Envoy Gateway.
  # Requires Gateway API CRDs v1.1+.
  # Example for AWS NLB:
  #   infrastructure:
  #     annotations:
  #       service.beta.kubernetes.io/aws-load-balancer-type: external
  #       service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
  infrastructure:
    annotations: {}
  # Enable if your load balancer sends PROXY protocol headers (e.g. Hetzner with
  # load-balancer.hetzner.cloud/uses-proxyprotocol: "true"). Creates a
  # ClientTrafficPolicy targeting the Gateway.
  proxyProtocol:
    enabled: false
    # If true, connections without a PROXY protocol header are also accepted.
    # Use this only if some traffic bypasses the load balancer (e.g. direct node access).
    # WARNING: breaks PROXY protocol spec compliance.
    optional: false
  listeners:
    https:
      port: 443
    # Enable the HTTP listener if you want to use HTTP01 challenges via cert-manager's
    # gatewayHTTPRoute solver. Requires cert-manager >= 1.14.
    # See the README for configuration details.
    http:
      enabled: false
      port: 80

teamSettings:
  enabled: false
accountPages:
  enabled: false
websockets:
  enabled: true
webapp:
  enabled: true
fakeS3:
  enabled: true

services:
  nginz:
    # Update this if you've overwritten the default HTTP port in nginz.
    httpPort: 8080
    # Update this if you've overwritten the default WebSocket port in nginz.
    wsPort: 8081

tls:
  secret:
    # If true, a kubernetes.io/tls Secret is created from secrets.tlsWildcardCert
    # and secrets.tlsWildcardKey. Set to false if the secret is managed externally.
    create: true
    # Override the name of the Secret. If not set, the name is derived from the release name.
    nameOverride: ""
  useCertManager: false
  createIssuer: true
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 384  # 521 is not supported by Let's Encrypt
  issuer:
    name: letsencrypt-http01
    kind: Issuer  # Issuer | ClusterIssuer
  # caNamespace: wire-federation-v0

certManager:
  # If true, uses the Let's Encrypt staging API (certificates are NOT trusted):
  #   https://acme-staging-v02.api.letsencrypt.org/directory
  # If false (default), uses the production API (certificates are trusted):
  #   https://acme-v02.api.letsencrypt.org/directory
  inTestMode: false
  certmasterEmail:
  customSolvers:

# You will need to supply DNS names:
# config:
#   dns:
#     https: nginz-https.<domain>
#     ssl: nginz-ssl.<domain>       # ignored if websockets.enabled == false
#     webapp: webapp.<domain>       # ignored if webapp.enabled == false
#     fakeS3: assets.<domain>       # ignored if fakeS3.enabled == false
#     federator: federator.<domain> # ignored unless federator.enabled == true
#     certificateDomain: federator.<domain>  # domain to use in the federator CSR
#     teamSettings: teams.<domain>  # ignored unless teamSettings.enabled == true
#     accountPages: account.<domain> # ignored unless accountPages.enabled == true
#
# For TLS (manual mode, tls.useCertManager: false):
# secrets:
#   tlsWildcardCert: |
#     -----BEGIN CERTIFICATE-----
#     ...
#     -----END CERTIFICATE-----
#   tlsWildcardKey: |
#     -----BEGIN PRIVATE KEY-----
#     ...
#     -----END PRIVATE KEY-----
#   tlsClientCA: |
#     -----BEGIN CERTIFICATE-----
#     ...
#     -----END CERTIFICATE-----
