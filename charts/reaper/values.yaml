image:
  # Use a kubectl image that includes a shell (sh/bash). Distroless images will fail to exec the script.
  registry: dhi.io
  repository: kubectl
  tag: 1.35.0
podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
