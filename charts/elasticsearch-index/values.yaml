# Default values for elasticsearch-index
#
# This chart uses brig's ConfigMap for configuration, which should be deployed
# before this chart. The brig ConfigMap contains elasticsearch, cassandra,
# and galley settings needed by brig-index.
#
# The following settings are specific to index creation and can be customized:
elasticsearch:
  # Index creation settings (not read from brig.yaml)
  shards: 5
  replicas: 2
  refreshInterval: 5
  delete_template: directory

image:
  repository: quay.io/wire/brig-index
  tag: do-not-use

podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

secrets: {}

# NOTE: The following settings are DEPRECATED and no longer used.
# Configuration is now read from brig's ConfigMap (brig.yaml).
# These are kept for backward compatibility documentation only.
#
# elasticsearch:
#   scheme: http
#   host: elasticsearch-client
#   port: 9200
#   index: directory
#   insecureSkipTlsVerify: false
#   tlsCa or tlsCaSecretRef for custom TLS CA
#
# cassandra:
#   host: cassandra
#   port: 9042
#   keyspace: brig
#   tlsCa or tlsCaSecretRef for TLS
#
# galley:
#   host: galley
#   port: 8080
